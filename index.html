<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>🎵 音乐播放器</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box }
    :root {
      --bg: #1A1A2E; --surface: #16213E; --primary: #FF6B6B;
      --accent: #4ECDC4; --text: #EAEAEA; --text2: #A0A0A0;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; padding-bottom: calc(100px + var(--safe-bottom));
      -webkit-tap-highlight-color: transparent;
    }
    .header {
      padding: 16px; position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .header h1 { font-size: 24px; margin-bottom: 4px; }
    .header .sub { font-size: 12px; color: var(--text2); }
    .btn-row {
      display: flex; gap: 8px; padding: 0 16px 12px;
    }
    .btn-row button {
      flex: 1; padding: 12px; border: 1px solid var(--text2);
      border-radius: 12px; background: transparent; color: var(--text);
      font-size: 14px; cursor: pointer;
    }
    .btn-row button.primary {
      background: var(--primary); border-color: var(--primary); font-weight: 700;
    }
    .track-list { padding: 0 12px; }
    .track-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; margin: 4px 0;
      background: var(--surface); border-radius: 12px;
      cursor: pointer; transition: transform 0.1s;
    }
    .track-item:active { transform: scale(0.98) }
    .track-item.playing { border: 2px solid var(--primary) }
    .track-item .cover {
      width: 48px; height: 48px; border-radius: 10px;
      background: var(--primary); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .track-item .info { flex: 1; min-width: 0 }
    .track-item .name {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-item .artist { font-size: 13px; color: var(--text2); margin-top: 2px }
    .track-item .del-btn {
      background: none; border: none; color: var(--primary);
      font-size: 20px; cursor: pointer; padding: 8px;
    }
    .empty {
      text-align: center; padding: 60px 20px; color: var(--text2);
    }
    .empty .icon { font-size: 56px; margin-bottom: 16px }
    .player-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); padding: 12px 16px calc(12px + var(--safe-bottom));
      z-index: 100; display: none;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    .player-bar.active { display: block }
    .player-info {
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    }
    .player-info .pcover {
      width: 48px; height: 48px; border-radius: 8px;
      background: var(--primary); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .player-info .pinfo { flex: 1; min-width: 0 }
    .player-info .pname {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-info .partist { font-size: 12px; color: var(--text2) }
    .player-controls {
      display: flex; align-items: center; justify-content: center; gap: 20px;
    }
    .player-controls button {
      width: 44px; height: 44px; background: none; border: none;
      color: var(--text); font-size: 22px; cursor: pointer;
    }
    .player-controls .btn-play {
      width: 56px; height: 56px; background: var(--primary);
      border-radius: 50%; font-size: 24px;
    }
    .progress-wrap {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; font-size: 11px; color: var(--text2);
    }
    .progress-wrap input[type=range] {
      flex: 1; height: 4px; -webkit-appearance: none;
      background: var(--text2); border-radius: 2px; outline: none;
    }
    .progress-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      background: var(--primary); border-radius: 50%; cursor: pointer;
    }
    .toast {
      position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--bg);
      padding: 10px 24px; border-radius: 20px; font-size: 14px;
      z-index: 200; animation: toast-in 0.3s ease; pointer-events: none;
    }
    @keyframes toast-in { from { opacity:0; transform:translateX(-50%) translateY(20px) } }
  </style>
</head>
<body>

<div class="header">
  <h1>🎵 音乐播放器</h1>
  <div class="sub">本地音乐 · 完全离线 · 无需网络</div>
</div>

<div class="btn-row">
  <button class="primary" onclick="document.getElementById('fileInput').click()">📁 添加音乐</button>
  <button onclick="document.getElementById('folderInput').click()">📂 添加文件夹</button>
</div>
<input type="file" id="fileInput" accept="audio/*" multiple style="display:none" onchange="addFiles(this.files)">
<input type="file" id="folderInput" webkitdirectory multiple style="display:none" onchange="addFiles(this.files)">

<div class="track-list" id="trackList">
  <div class="empty">
    <div class="icon">🎶</div>
    <p>点击「添加音乐」选择MP3文件</p>
    <p style="font-size:12px;margin-top:8px">歌曲存储在浏览器中，离线也能听</p>
  </div>
</div>

<div class="player-bar" id="playerBar">
  <div class="progress-wrap">
    <span id="curTime">0:00</span>
    <input type="range" id="progressBar" value="0" min="0" max="100">
    <span id="totalTime">0:00</span>
  </div>
  <div class="player-info">
    <div class="pcover">🎵</div>
    <div class="pinfo">
      <div class="pname" id="pName">选择一首歌</div>
      <div class="partist" id="pArtist"></div>
    </div>
    <div class="player-controls">
      <button onclick="prevTrack()">⏮</button>
      <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶️</button>
      <button onclick="nextTrack()">⏭</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ===== State =====
let playlist = [];
let currentIndex = -1;
let audio = new Audio();
const DB_NAME = 'MusicPlayerV2';
const DB_VERSION = 1;

// ===== IndexedDB =====
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('songs')) {
        db.createObjectStore('songs', { keyPath: 'id' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function saveSong(id, name, artist, blob) {
  const db = await openDB();
  const tx = db.transaction('songs', 'readwrite');
  tx.objectStore('songs').put({ id, name, artist, blob });
}

async function deleteSong(id) {
  const db = await openDB();
  const tx = db.transaction('songs', 'readwrite');
  tx.objectStore('songs').delete(id);
}

async function loadSongs() {
  const db = await openDB();
  const tx = db.transaction('songs', 'readonly');
  const items = await new Promise(resolve => {
    const req = tx.objectStore('songs').getAll();
    req.onsuccess = () => resolve(req.result);
  });
  playlist = items.map(item => ({
    id: item.id,
    name: item.name,
    artist: item.artist || '未知歌手',
    blob: item.blob,
    url: URL.createObjectURL(item.blob)
  }));
  renderList();
}

// ===== File Handling =====
async function addFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|m4a|flac|ogg|wav|wma|aac)$/i));
  if (files.length === 0) {
    showToast('未找到音频文件');
    return;
  }

  for (const file of files) {
    // Parse filename: "Artist - Title.mp3" or "Title.mp3"
    let name = file.name.replace(/\.[^.]+$/, '');
    let artist = '未知歌手';
    const dash = name.indexOf(' - ');
    if (dash > 0) {
      artist = name.substring(0, dash).trim();
      name = name.substring(dash + 3).trim();
    }

    const id = Date.now() + Math.random().toString(36);
    const blob = new Blob([await file.arrayBuffer()], { type: file.type || 'audio/mpeg' });

    await saveSong(id, name, artist, blob);
    playlist.push({
      id, name, artist, blob,
      url: URL.createObjectURL(blob)
    });
  }

  renderList();
  showToast(`已添加 ${files.length} 首歌`);
}

// ===== Player =====
function playTrack(index) {
  if (index < 0 || index >= playlist.length) return;
  currentIndex = index;
  const track = playlist[index];
  audio.src = track.url;
  audio.play().catch(() => showToast('播放失败'));
  updatePlayerUI();
  renderList();
}

function togglePlay() {
  if (playlist.length === 0) return;
  if (currentIndex < 0) { playTrack(0); return; }
  audio.paused ? audio.play() : audio.pause();
  updatePlayBtn();
}

function nextTrack() {
  if (playlist.length === 0) return;
  playTrack((currentIndex + 1) % playlist.length);
}
function prevTrack() {
  if (playlist.length === 0) return;
  playTrack(currentIndex <= 0 ? playlist.length - 1 : currentIndex - 1);
}

function updatePlayerUI() {
  const track = playlist[currentIndex];
  if (!track) return;
  document.getElementById('playerBar').classList.add('active');
  document.getElementById('pName').textContent = track.name;
  document.getElementById('pArtist').textContent = track.artist;
  updatePlayBtn();
}
function updatePlayBtn() {
  document.getElementById('btnPlay').textContent = audio.paused ? '▶️' : '⏸';
}

function updateProgress() {
  if (audio.duration) {
    document.getElementById('progressBar').value = (audio.currentTime / audio.duration) * 100;
    document.getElementById('curTime').textContent = formatTime(audio.currentTime);
  }
}
document.getElementById('progressBar').addEventListener('input', e => {
  audio.currentTime = (e.target.value / 100) * (audio.duration || 1);
});

// ===== UI =====
function renderList() {
  const container = document.getElementById('trackList');
  if (playlist.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">🎶</div><p>点击「添加音乐」选择MP3文件</p><p style="font-size:12px;margin-top:8px">歌曲存储在浏览器中，离线也能听</p></div>';
    return;
  }
  container.innerHTML = playlist.map((t, i) => `
    <div class="track-item ${i === currentIndex && !audio.paused ? 'playing' : ''}" onclick="playTrack(${i})">
      <div class="cover">🎵</div>
      <div class="info">
        <div class="name">${esc(t.name)}</div>
        <div class="artist">${esc(t.artist)}</div>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();removeTrack(${i})">×</button>
    </div>
  `).join('');
}

async function removeTrack(index) {
  const track = playlist[index];
  if (index === currentIndex) {
    audio.pause();
    audio.src = '';
    currentIndex = -1;
    document.getElementById('playerBar').classList.remove('active');
  } else if (index < currentIndex) {
    currentIndex--;
  }
  URL.revokeObjectURL(track.url);
  await deleteSong(track.id);
  playlist.splice(index, 1);
  renderList();
  showToast('已删除');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 2000);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== Events =====
audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('ended', nextTrack);
audio.addEventListener('play', updatePlayBtn);
audio.addEventListener('pause', updatePlayBtn);
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totalTime').textContent = formatTime(audio.duration || 0);
});

// Media session for lock screen
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play', togglePlay);
  navigator.mediaSession.setActionHandler('pause', togglePlay);
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
}

// ===== Init =====
(async () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  await loadSongs();
})();
</script>
</body>
</html>
