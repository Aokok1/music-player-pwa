<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A2E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <title>🎵 音乐播放器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1A1A2E;
      --surface: #16213E;
      --primary: #FF6B6B;
      --accent: #4ECDC4;
      --text: #EAEAEA;
      --text2: #A0A0A0;
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: calc(100px + var(--safe-bottom));
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    /* Header */
    .header {
      padding: 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    .search-box {
      display: flex;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      height: 48px;
      background: var(--surface);
      border: none;
      border-radius: 24px;
      padding: 0 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    .search-box button {
      width: 48px; height: 48px;
      background: var(--primary);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
    }
    /* Tags */
    .tags {
      display: flex;
      gap: 8px;
      padding: 0 16px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tags button {
      flex-shrink: 0;
      padding: 8px 16px;
      border: 1px solid var(--text2);
      border-radius: 20px;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .tags button.active { background: var(--primary); border-color: var(--primary); }
    /* Tabs */
    .tabs {
      display: flex;
      padding: 0 16px 8px;
      border-bottom: 1px solid var(--surface);
      margin-bottom: 8px;
    }
    .tabs button {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tabs button.active {
      color: var(--text);
      border-bottom-color: var(--primary);
    }
    /* Track List */
    .track-list {
      padding: 0 12px;
    }
    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin: 4px 0;
      background: var(--surface);
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .track-item:active { transform: scale(0.98); }
    .track-item.playing { border: 2px solid var(--primary); }
    .track-item .cover {
      width: 52px; height: 52px;
      border-radius: 10px;
      background: var(--primary);
      flex-shrink: 0;
      object-fit: cover;
    }
    .track-item .info { flex: 1; min-width: 0; }
    .track-item .name {
      font-size: 15px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-item .artist {
      font-size: 13px; color: var(--text2);
      margin-top: 2px;
    }
    .track-item .actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .track-item .actions button {
      width: 36px; height: 36px;
      background: none; border: none;
      color: var(--text2); font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .track-item .actions button.downloaded { color: var(--accent); }
    /* Player Bar */
    .player-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      z-index: 100;
      display: none;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    }
    .player-bar.active { display: block; }
    .player-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .player-info .pcover {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--primary);
    }
    .player-info .pinfo { flex: 1; min-width: 0; }
    .player-info .pname {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .player-info .partist { font-size: 12px; color: var(--text2); }
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .player-controls button {
      width: 40px; height: 40px;
      background: none; border: none;
      color: var(--text); font-size: 20px;
      cursor: pointer;
    }
    .player-controls .btn-play {
      width: 52px; height: 52px;
      background: var(--primary);
      border-radius: 50%;
      font-size: 22px;
    }
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--text2);
    }
    .progress-wrap input[type=range] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: var(--text2);
      border-radius: 2px;
      outline: none;
    }
    .progress-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      background: var(--primary);
      border-radius: 50%;
      cursor: pointer;
    }
    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      color: var(--text2);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--surface);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Toast */
    .toast {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: var(--bg);
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 200;
      animation: toast-in 0.3s ease;
      pointer-events: none;
    }
    @keyframes toast-in { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }
    /* Empty State */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty .icon { font-size: 48px; margin-bottom: 16px; }
    /* Download progress bar inside item */
    .track-item .download-bar {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin-top: 4px;
      transition: width 0.3s;
    }
    /* History list */
    .download-list .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      margin: 4px 12px;
      background: var(--surface);
      border-radius: 12px;
    }
    .download-list .file-item .del-btn {
      background: none; border: none;
      color: var(--primary); font-size: 14px;
      cursor: pointer; padding: 8px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🎵 音乐播放器</h1>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索音乐..." enterkeyhint="search">
    <button onclick="search()">🔍</button>
  </div>
</div>

<div class="tags" id="tags">
  <button onclick="loadTag('')" class="active">热门</button>
  <button onclick="loadTag('rock')">🎸 摇滚</button>
  <button onclick="loadTag('pop')">🎤 流行</button>
  <button onclick="loadTag('electronic')">🎹 电子</button>
  <button onclick="loadTag('jazz')">🎷 爵士</button>
  <button onclick="loadTag('hiphop')">🎧 嘻哈</button>
  <button onclick="loadTag('classical')">🎻 古典</button>
</div>

<div class="tabs">
  <button onclick="switchTab('search')" class="active" id="tabSearch">🔍 在线</button>
  <button onclick="switchTab('downloads')" id="tabDownloads">💾 已下载</button>
</div>

<div class="track-list" id="trackList"></div>
<div class="download-list" id="downloadList" style="display:none"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="empty" id="empty">
  <div class="icon">🎶</div>
  <p>搜索你喜欢的音乐</p>
</div>

<!-- Player Bar -->
<div class="player-bar" id="playerBar">
  <div class="progress-wrap">
    <span id="curTime">0:00</span>
    <input type="range" id="progressBar" value="0" min="0" max="100">
    <span id="totalTime">0:00</span>
  </div>
  <div class="player-info">
    <img class="pcover" id="pCover" src="" alt="">
    <div class="pinfo">
      <div class="pname" id="pName">选择一首歌</div>
      <div class="partist" id="pArtist"></div>
    </div>
    <div class="player-controls">
      <button onclick="prevTrack()">⏮</button>
      <button class="btn-play" id="btnPlay" onclick="togglePlay()">▶️</button>
      <button onclick="nextTrack()">⏭</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ============ Jamendo API ============
const CLIENT_ID = 'b428c340';
const API_BASE = 'https://api.jamendo.com/v3.0/tracks/';
let currentTab = 'search';

async function fetchTracks(params = {}) {
  const defaults = {
    client_id: CLIENT_ID,
    limit: 30,
    audioformat: 'mp32',
    order: 'popularity_total'
  };
  const query = new URLSearchParams({ ...defaults, ...params });
  const res = await fetch(`${API_BASE}?${query}`);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  const data = await res.json();
  if (data.headers.status !== 'success') throw new Error('API error');
  return data.results;
}

// ============ State ============
let tracks = [];
let playlist = [];
let currentIndex = -1;
let audio = new Audio();
let downloadedFiles = []; // {name, artist, blob, url}
let downloadProgress = {}; // trackId -> percentage

// ============ Player ============
audio.addEventListener('timeupdate', updateProgress);
audio.addEventListener('ended', nextTrack);
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('totalTime').textContent = formatTime(audio.duration || 0);
});

function playTrack(index) {
  if (index < 0 || index >= playlist.length) return;
  currentIndex = index;
  const track = playlist[index];
  
  // Check if downloaded
  const dFile = downloadedFiles.find(f => f.name === track.name && f.artist === track.artist_name);
  if (dFile) {
    audio.src = dFile.url;
  } else {
    audio.src = track.audio;
  }
  
  audio.play();
  updatePlayerUI();
  renderTrackList();
}

function togglePlay() {
  if (!audio.src && playlist.length > 0) {
    playTrack(0);
    return;
  }
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
  updatePlayBtn();
}

function nextTrack() {
  if (currentIndex < playlist.length - 1) {
    playTrack(currentIndex + 1);
  } else if (playlist.length > 0) {
    playTrack(0);
  }
}

function prevTrack() {
  if (currentIndex > 0) {
    playTrack(currentIndex - 1);
  } else if (playlist.length > 0) {
    playTrack(playlist.length - 1);
  }
}

function seekTo(e) {
  const val = e.target.value;
  audio.currentTime = (val / 100) * (audio.duration || 1);
}

function updateProgress() {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressBar').value = pct;
    document.getElementById('curTime').textContent = formatTime(audio.currentTime);
  }
}

function updatePlayBtn() {
  document.getElementById('btnPlay').textContent = audio.paused ? '▶️' : '⏸';
}

function updatePlayerUI() {
  const track = playlist[currentIndex];
  if (!track) return;
  document.getElementById('playerBar').classList.add('active');
  document.getElementById('pName').textContent = track.name;
  document.getElementById('pArtist').textContent = track.artist_name;
  document.getElementById('pCover').src = track.image;
  updatePlayBtn();
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ============ UI ============
function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'flex' : 'none';
}

function showEmpty(show) {
  document.getElementById('empty').style.display = show ? 'block' : 'none';
}

function renderTrackList() {
  const container = document.getElementById('trackList');
  const list = currentTab === 'search' ? tracks : [];
  
  if (list.length === 0 && currentTab === 'search') {
    container.innerHTML = '';
    return;
  }
  
  container.innerHTML = list.map((t, i) => {
    const isPlaying = playlist[currentIndex]?.id === t.id;
    const isDownloaded = downloadedFiles.some(f => f.name === t.name && f.artist === t.artist_name);
    const dlPct = downloadProgress[t.id] || 0;
    const dur = formatDuration(t.duration);
    return `
      <div class="track-item ${isPlaying ? 'playing' : ''}" onclick="playFromSearch(${i})">
        <img class="cover" src="${t.image}" alt="" loading="lazy" 
             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23FF6B6B%22 width=%22100%22 height=%22100%22/><text y=%22.6em%22 font-size=%2250%22 text-anchor=%22middle%22>🎵</text></svg>'">
        <div class="info">
          <div class="name">${escapeHtml(t.name)}</div>
          <div class="artist">${escapeHtml(t.artist_name)} · ${dur}</div>
          ${dlPct > 0 && dlPct < 100 ? `<div class="download-bar" style="width:${dlPct}%"></div>` : ''}
        </div>
        <div class="actions" onclick="event.stopPropagation()">
          <button class="${isDownloaded ? 'downloaded' : ''}" 
                  onclick="downloadTrack(${i})" 
                  title="${isDownloaded ? '已下载' : '下载'}">
            ${isDownloaded ? '✅' : '⬇️'}
          </button>
        </div>
      </div>
    `;
  }).join('');
  
  if (isPlaying()) {
    const playingEl = container.querySelector('.playing');
    if (playingEl) playingEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function playFromSearch(index) {
  playlist = [...tracks];
  playTrack(index);
}

function renderDownloadList() {
  const container = document.getElementById('downloadList');
  if (downloadedFiles.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📂</div><p>还没有下载的音乐</p></div>';
    return;
  }
  
  container.innerHTML = downloadedFiles.map((f, i) => `
    <div class="file-item" onclick="playDownloaded(${i})">
      <div>
        <div style="font-weight:600">${escapeHtml(f.name)}</div>
        <div style="color:var(--text2);font-size:13px">${escapeHtml(f.artist)}</div>
      </div>
      <button class="del-btn" onclick="event.stopPropagation();deleteDownload(${i})">删除</button>
    </div>
  `).join('');
}

function playDownloaded(index) {
  playlist = downloadedFiles.map(f => ({
    id: f.name + f.artist,
    name: f.name,
    artist_name: f.artist,
    audio: f.url,
    image: '',
    duration: 0,
  }));
  playTrack(currentIndex === index ? currentIndex : index);
}

function deleteDownload(index) {
  const f = downloadedFiles[index];
  URL.revokeObjectURL(f.url);
  // Remove from IndexedDB
  removeFromDB(f.name, f.artist);
  downloadedFiles.splice(index, 1);
  renderDownloadList();
  renderTrackList();
  showToast('已删除');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabSearch').classList.toggle('active', tab === 'search');
  document.getElementById('tabDownloads').classList.toggle('active', tab === 'downloads');
  document.getElementById('trackList').style.display = tab === 'search' ? '' : 'none';
  document.getElementById('downloadList').style.display = tab === 'downloads' ? '' : 'none';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
  
  if (tab === 'downloads') renderDownloadList();
}

function isPlaying() {
  return playlist.length > 0 && currentIndex >= 0 && !audio.paused;
}

// ============ Search ============
async function search() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  
  switchTab('search');
  showLoading(true);
  showEmpty(false);
  document.getElementById('trackList').innerHTML = '';
  
  try {
    tracks = await fetchTracks({ search: q });
    playlist = [...tracks];
    showEmpty(tracks.length === 0);
  } catch (e) {
    showToast('搜索失败: ' + e.message);
    tracks = [];
    showEmpty(true);
  }
  
  showLoading(false);
  renderTrackList();
}

async function loadTag(tag) {
  switchTab('search');
  document.querySelectorAll('.tags button').forEach(b => b.classList.remove('active'));
  if (event?.target) event.target.classList.add('active');
  
  showLoading(true);
  showEmpty(false);
  document.getElementById('trackList').innerHTML = '';
  
  try {
    const params = tag ? { tags: tag } : {};
    tracks = await fetchTracks(params);
    playlist = [...tracks];
    showEmpty(tracks.length === 0);
  } catch (e) {
    showToast('加载失败');
    tracks = [];
    showEmpty(true);
  }
  
  showLoading(false);
  renderTrackList();
}

// ============ Download ============
async function downloadTrack(index) {
  const track = tracks[index];
  if (!track) return;
  
  const url = track.audiodownload || track.audio;
  downloadProgress[track.id] = 0;
  renderTrackList();
  
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Download failed');
    
    const total = +res.headers.get('Content-Length') || 0;
    const reader = res.body.getReader();
    const chunks = [];
    let received = 0;
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      if (total > 0) {
        downloadProgress[track.id] = Math.round((received / total) * 100);
        renderTrackList();
      }
    }
    
    const blob = new Blob(chunks, { type: 'audio/mpeg' });
    const blobUrl = URL.createObjectURL(blob);
    
    downloadedFiles.push({
      name: track.name,
      artist: track.artist_name,
      blob: blob,
      url: blobUrl
    });
    
    delete downloadProgress[track.id];
    
    // Save to IndexedDB
    await saveToDB(track.name, track.artist_name, blob);
    
    renderTrackList();
    showToast('下载完成 ✅');
  } catch (e) {
    delete downloadProgress[track.id];
    showToast('下载失败');
    renderTrackList();
  }
}

// ============ IndexedDB ============
const DB_NAME = 'MusicCache';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('music')) {
        db.createObjectStore('music', { keyPath: 'id' });
      }
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function saveToDB(name, artist, blob) {
  const db = await openDB();
  const tx = db.transaction('music', 'readwrite');
  const store = tx.objectStore('music');
  store.put({ id: `${artist} - ${name}`, name, artist, blob });
}

async function removeFromDB(name, artist) {
  const db = await openDB();
  const tx = db.transaction('music', 'readwrite');
  const store = tx.objectStore('music');
  store.delete(`${artist} - ${name}`);
}

async function loadFromDB() {
  const db = await openDB();
  const tx = db.transaction('music', 'readonly');
  const store = tx.objectStore('music');
  const req = store.getAll();
  
  return new Promise((resolve) => {
    req.onsuccess = () => {
      const items = req.result;
      downloadedFiles = items.map(item => ({
        name: item.name,
        artist: item.artist,
        blob: item.blob,
        url: URL.createObjectURL(item.blob)
      }));
      resolve();
    };
    req.onerror = () => resolve();
  });
}

// ============ Toast ============
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => el.style.display = 'none', 2000);
}

// ============ Helpers ============
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ============ Keyboard ============
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') search();
});

// ============ Init ============
(async function init() {
  // Register SW
  if ('serviceWorker' in navigator) {
    try {
      const reg = await navigator.serviceWorker.register('sw.js');
      console.log('SW registered', reg);
    } catch (e) {
      console.log('SW failed', e);
    }
  }
  
  // Load downloads from IndexedDB
  await loadFromDB();
  
  // Load popular tracks
  loadTag('');
  
  // Audio events
  audio.addEventListener('play', updatePlayBtn);
  audio.addEventListener('pause', updatePlayBtn);
  
  // Progress bar
  document.getElementById('progressBar').addEventListener('input', seekTo);
})();
</script>
</body>
</html>
