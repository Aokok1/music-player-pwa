<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🎵 音乐播放器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1A1A2E;
    color: #EAEAEA;
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    text-align: center;
    padding: 20px;
  }
  .icon { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  p { color: #A0A0A0; margin-bottom: 28px; font-size: 14px; }
  .btn {
    display: inline-block;
    background: #FF6B6B;
    color: #fff;
    text-decoration: none;
    padding: 16px 48px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .hint {
    position: absolute;
    bottom: 40px;
    color: #A0A0A0;
    font-size: 12px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="icon">🎵</div>
  <h1>音乐播放器</h1>
  <p>在线听歌 · 搜索下载 · 离线播放</p>
  <a class="btn" href="https://Aokok1.github.io/music-player-pwa/">打开 App</a>
  <div class="hint">
    打开后 → 浏览器菜单<br>
    →「添加到主屏幕」→ 完成
  </div>
</body>
</html>
